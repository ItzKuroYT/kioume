<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Artist pricing and commission page" />
    <title>Pricing</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page="pricing">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <span class="brand-mark"></span>
          <span class="brand-text" id="brand-text">Artist</span>
        </a>

        <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links">
          Menu
        </button>

        <nav class="site-nav" aria-label="Main navigation">
          <ul id="nav-links" class="nav-links"></ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section pricing-hero">
        <div class="container">
          <div class="section-head reveal" data-reveal="up">
            <p class="hero-badge">Commission Menu</p>
            <h1 id="pricing-heading">Commission Pricing</h1>
            <p id="pricing-subheading"></p>
          </div>

          <div class="carousel reveal" data-reveal="zoom" id="pricing-carousel">
            <div class="carousel-track" id="carousel-track"></div>
            <button class="carousel-btn carousel-btn-prev" id="carousel-prev" aria-label="Previous image">
              &lt;
            </button>
            <button class="carousel-btn carousel-btn-next" id="carousel-next" aria-label="Next image">
              &gt;
            </button>
            <div class="carousel-dots" id="carousel-dots"></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="pricing-grid" id="pricing-cards"></div>
          <div class="pricing-actions reveal" data-reveal="up">
            <a class="btn btn-primary" href="index.html#contact">Book A Commission</a>
            <a class="btn btn-secondary" href="index.html#portfolio">Back To Portfolio</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p id="footer-copy">Copyright 2026 Artist. All rights reserved.</p>
        <div class="footer-links" id="footer-links"></div>
        <div class="social-row" id="footer-socials"></div>
      </div>
    </footer>
  </body>
</html>
